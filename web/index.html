<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H5游戏管理器</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- App Container -->
    <div id="app" class="app-container">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="app-logo">
                    <i class="bi bi-controller"></i>
                </div>
                <h1 class="app-title">H5游戏管理器</h1>
            </div>

            <nav class="sidebar-nav">
                <a href="#/" class="nav-item" data-route="/">
                    <i class="bi bi-speedometer2"></i>
                    <span>仪表盘</span>
                </a>
                <a href="#/games" class="nav-item" data-route="/games">
                    <i class="bi bi-grid-fill"></i>
                    <span>游戏管理</span>
                </a>
                <a href="#/categories" class="nav-item" data-route="/categories">
                    <i class="bi bi-tags-fill"></i>
                    <span>分类管理</span>
                </a>
                <a href="#/users" class="nav-item" data-route="/users">
                    <i class="bi bi-people-fill"></i>
                    <span>用户管理</span>
                </a>
                <a href="#/settings" class="nav-item" data-route="/settings">
                    <i class="bi bi-gear-fill"></i>
                    <span>系统设置</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="avatar" id="currentUserAvatar">
                        <i class="bi bi-person-fill"></i>
                    </div>
                    <div class="user-details">
                        <span class="username" id="currentUsername">admin</span>
                        <span class="user-role badge bg-secondary" id="currentUserRole">管理员</span>
                    </div>
                </div>
                <button class="btn btn-sm btn-outline-danger logout-btn" onclick="App.logout()" title="退出登录">
                    <i class="bi bi-box-arrow-right"></i>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <header class="top-bar">
                <button class="btn btn-icon sidebar-toggle" onclick="App.toggleSidebar()" title="收起侧边栏">
                    <i class="bi bi-list"></i>
                </button>
                <div class="top-bar-title" id="pageTitle">仪表盘</div>
                <div class="top-bar-actions">
                    <button class="btn btn-primary btn-sm" onclick="App.navigate('#/games/new')" id="btnQuickAdd">
                        <i class="bi bi-plus-lg"></i> 添加游戏
                    </button>
                </div>
            </header>

            <!-- Page Content -->
            <div class="content-area" id="contentArea">
                <!-- Dynamically rendered by app.js -->
            </div>
        </main>
    </div>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- App Scripts -->
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/pages/login.js"></script>
    <script src="js/pages/dashboard.js"></script>
    <script src="js/pages/games.js"></script>
    <script src="js/pages/categories.js"></script>
    <script src="js/pages/users.js"></script>
    <script src="js/pages/settings.js"></script>
</body>
</html>
